<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Glow -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>
    
    <!-- Neon Glow Filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur1" />
      <feGaussianBlur stdDeviation="20" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Neon Gradient for the cursive strokes -->
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" /> <!-- Electric Blue -->
      <stop offset="60%" stop-color="#a855f7" /> <!-- Neon Purple -->
      <stop offset="100%" stop-color="#ec4899" /> <!-- Hot Pink -->
    </linearGradient>
  </defs>

  <!-- Background radial glow -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGlow)" />

  <!-- Cursive "W" path mimicking a glowing hand-drawn neon light -->
  <path d="M 100 240 C 130 240, 140 140, 170 140 C 205 140, 195 360, 240 360 C 275 360, 270 170, 305 170 C 340 170, 330 360, 375 360 C 410 360, 425 240, 450 180" 
        fill="none" 
        stroke="url(#neonGrad)" 
        stroke-width="36" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        filter="url(#glow)" />
</svg>